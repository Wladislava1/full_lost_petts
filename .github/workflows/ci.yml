name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: --health-cmd "curl -f http://localhost:9000/minio/health/live" --health-interval 10s --health-retries 5
        command: server /data
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install minio
          
      - name: Wait for MinIO
        run: |
          until curl -f http://localhost:9000/minio/health/live; do
            echo "Waiting for MinIO..."
            sleep 2
          done
          echo "MinIO is ready"
          
      - name: Create media bucket
        run: |
          python -c "
          from minio import Minio
          client = Minio('localhost:9000', access_key='minioadmin', secret_key='minioadmin', secure=False)
          if not client.bucket_exists('media'):
              client.make_bucket('media')
              print('Bucket media created')
          else:
              print('Bucket media already exists')
          "
          
      - name: Run Pytest with Coverage
        run: |
          PYTHONPATH=. pytest backend/tests/ -v --cov=backend

  frontend-tests:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
        
      - name: Run ESLint (Линтер)
        working-directory: ./frontend
        run: npm run lint
        
      - name: Run Vitest with Coverage
        working-directory: ./frontend
        run: npm run coverage
        
      - name: Test React Build
        working-directory: ./frontend
        run: npm run build

  docker-build-check:
    name: Docker Build Check
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check Docker Compose Build
        run: docker-compose build